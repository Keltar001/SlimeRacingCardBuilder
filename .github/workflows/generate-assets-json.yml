name: Generate Card Builder assets

on:
  push:
    branches:
      - main
    paths:
      - "assets/card-builder/**"

permissions:
  contents: write

jobs:
  generate-assets-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Generate assets.json
        run: node scripts/generate-assets-json.js

      - name: Commit updated assets.json
        run: |
          if git diff --quiet -- data/assets.json; then
            echo "data/assets.json is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/assets.json
          git commit -m "chore: update Card Builder assets manifest"
          git push
